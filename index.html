<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stock Wish Ranking</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  margin:0;
  background:#f4f6f9;
  color:#111;
}

header{
  padding:20px;
  font-size:22px;
  font-weight:800;
  text-align:center;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.tabs{
  display:flex;
  background:white;
}

.tab{
  flex:1;
  padding:14px;
  text-align:center;
  cursor:pointer;
  font-weight:600;
  border-bottom:3px solid transparent;
}

.tab.active{
  border-bottom:3px solid #2563eb;
  color:#2563eb;
}

.container{
  max-width:600px;
  margin:20px auto;
  padding:10px;
}

.section-title{
  font-size:14px;
  font-weight:700;
  color:#666;
  margin:20px 0 10px;
  text-transform:uppercase;
  letter-spacing:1px;
}

.card{
  background:white;
  padding:18px;
  margin-bottom:12px;
  border-radius:14px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.pinned-card{
  border-left:6px solid #f59e0b;
}

.medal{
  font-size:18px;
  margin-right:8px;
}

.ticker{
  font-weight:700;
  font-size:18px;
}

.count{
  font-weight:800;
  font-size:20px;
  transition:transform 0.3s;
}

.flip{
  transform:scale(1.3);
}

button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
  margin-left:6px;
}

.admin-delete{
  background:#ef4444;
  color:white;
}

.admin-pin{
  background:#9ca3af;
  color:white;
}

.admin-pin.active{
  background:#f59e0b;
}

input{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:12px;
  /* 確保寬度計算包含 padding */
  box-sizing: border-box; 
}

.main-btn{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.hidden{ display:none; }

.admin-bar{
  text-align:right;
  padding:10px;
  /* 預設隱藏，由 app.js 判斷網址後顯示 */
  display: none; 
}

#adminStatus {
  font-size: 12px;
  color: #2563eb;
  font-weight: 600;
}
</style>
</head>

<body>

<header>財報分析許願 每天2票</header>

<div class="tabs">
  <div class="tab active" id="tabRank">排行榜 點擊+1</div>
  <div class="tab" id="tabVote">我要增加名單</div>
</div>

<div class="admin-bar" id="adminControlPanel">
  <span id="adminStatus"></span>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <div id="rankPage">
    <div id="pinnedSection"></div>
    <div id="normalSection"></div>
  </div>

  <div id="votePage" class="hidden">
    <input id="tickerInput" placeholder="輸入股票代碼 (ex: TSLA)">
    <button class="main-btn" onclick="voteInput()">送出許願</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>

</body>
</html>
